<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vent</title>
    <link rel="stylesheet" href="skin/base.css">
</head>
<body>

    <header class="main-header">
        <div class="menu-trigger left" id="open-history">history</div>
        <div class="menu-trigger right" id="open-settings">settings</div>
    </header>

    <aside id="history-drawer" class="side-menu left">
        <div class="menu-section">
            <h3>your diary</h3>
            <div id="history-list">
                <p class="empty-state">no past vents found.</p>
            </div>
        </div>
    </aside>

    <aside id="settings-drawer" class="side-menu right">
        <div class="menu-section">
            <h3>preferences</h3>
            <ul class="menu-links">
                <li><a href="#" id="theme-toggle">Toggle Theme</a></li>
                <li><a href="#">About Vent</a></li>
            </ul>
        </div>
        <div class="identity-settings">
            <h3>identity</h3>
            <a href="#" id="export-id" class="settings-link">copy recovery key</a>
            <a href="#" id="import-id" class="settings-link">import identity</a>
            <a href="#" id="shred-history" class="settings-link" style="color: #ff4444; margin-top: 20px;">shred history</a>
        </div>
    </aside>

    <div class="app-viewport">
        
        <main class="vent-container">
            <div class="hero-logo">vent</div>
            
            <div class="input-wrapper">
                <textarea id="problemInput" placeholder="What's on your mind?" spellcheck="false"></textarea>
                
                <button id="submitBtn" class="action-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4.329 20.84C3.809 21.01 3.25 20.6 3.329 20.06L4.35 13.999L13.88 11.999L4.35 10L3.329 3.93901C3.25 3.39901 3.809 2.99001 4.329 3.16001L21.3 8.66001C21.72 8.79001 22 9.17001 22 9.59901V14.4C22 14.83 21.72 15.21 21.3 15.34L4.329 20.84Z" fill="currentColor"/>
                    </svg>
                </button>
            </div>

            <div id="autocomplete-dropdown" class="suggestions-area"></div>
        </main>

        <footer class="minimal-footer">
            <a href="#" class="think-tank-link">Seeking solutions? Visit the Think Tank.</a>
            <a href="#" class="think-tank-link">© 2026 Think Tank</a>
        </footer>

    </div>

    <script src="main.js"></script>
</body>
</html>
