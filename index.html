<!DOCTYPE html>
<html lang="en">
<head>

    <title>Vent</title>

</head>
<body>

    <header class="main-header">
        <div class="menu-trigger" onclick="toggleMenu()">vent</div>

        <nav id="side-menu" class="menu-drawer">
            <ul>

                <li><a href="#">Login</a></li>

    <main class="app-viewport">

        </div>
    </main>

    <footer class="minimal-footer">
        <a href="#" class="think-tank-link">Seeking solutions? Visit the Think Tank.</a>
    </footer>

    <script src="script.js"></script>
