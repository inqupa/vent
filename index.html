<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Registry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Problem Registry</h1>
            <p>An anonymous space to log and track shared issues.</p>
        </header>

        <div class="card">
            <h3>Register a Problem</h3>
            <div class="input-row">
                <input type="text" id="problemInput" placeholder="What is the problem?">
                <select id="categoryInput">
                    <option value="General">General</option>
                    <option value="Personal">Personal</option>
                    <option value="Public">Public</option>
                    <option value="Social">Social</option>
                </select>
                <button id="submitBtn" onclick="submitProblem()">Register</button>
            </div>
        </div>

        <div class="card">
            <div class="list-controls">
                <h3>The Registry</h3>
                <div class="filter-row">
                    <input type="text" id="searchInput" onkeyup="filterProblems()" placeholder="Search problems...">
                    <select id="categoryFilter" onchange="filterProblems()">
                        <option value="All">All Categories</option>
                        <option value="General">General</option>
                        <option value="Personal">Personal</option>
                        <option value="Public">Public</option>
                        <option value="Social">Social</option>
                    </select>
                </div>
            </div>
            
            <div id="loading">Connecting to database...</div>
            <div id="registryList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
