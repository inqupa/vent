<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vent</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/input-system.css">
</head>
<body>

    <header class="main-header">
        <div class="menu-trigger">vent</div>
        
        <div class="menu-drawer">
            <ul class="menu-links">
                <li><a href="#" id="theme-toggle">Dark Mode</a></li>
                <li><a href="https://your-about-page.com">About Vent</a></li>
            </ul>
            <hr class="menu-divider">
            <div class="history-section">
                <h3>your recent vents</h3>
                <ul id="history-list">
                    <li class="empty-state">no past vents found.</li>
                </ul>
            </div>
            <hr class="menu-divider">
            <div class="identity-settings">
                <a href="#" id="export-id" class="settings-link">copy recovery key</a>
                <a href="#" id="import-id" class="settings-link">import identity</a>
            </div>
        </div>
    </header>

    <main class="app-viewport">
        <div class="vent-container">
            <div class="hero-logo">vent</div>
            
            <div class="input-wrapper">
                <textarea id="problemInput" placeholder="What's on your mind?"></textarea>
                <button id="submitBtn" class="action-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4.329 20.84C3.809 21.01 3.25 20.6 3.329 20.06L4.35 13.999L13.88 11.999L4.35 10L3.329 3.93901C3.25 3.39901 3.809 2.99001 4.329 3.16001L21.3 8.66001C21.72 8.79001 22 9.17001 22 9.59901V14.4C22 14.83 21.72 15.21 21.3 15.34L4.329 20.84Z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <footer class="minimal-footer">
        <a href="#" class="think-tank-link">Seeking solutions? Visit the Think Tank.</a>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
