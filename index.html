<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Registry Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <h1>Problem Registry</h1>
            <p>Community-driven data for a better future.</p>
        </header>

        <section class="card" id="registration-section">
            <h3>Register New Entry</h3>
            <div class="form-grid">
                <input type="text" id="input-problem" placeholder="Describe the problem...">
                <input type="text" id="input-location" placeholder="Neighborhood/City">
                <select id="input-category">
                    <option value="General">General</option>
                    <option value="Public">Public Infrastructure</option>
                    <option value="Social">Social Issues</option>
                    <option value="Environment">Environment</option>
                </select>
                <button id="btn-submit" class="primary-btn">Register</button>
            </div>
        </section>

        <section class="card" id="display-section">
            <div class="filter-bar">
                <input type="text" id="filter-search" placeholder="Search problems or locations...">
                <select id="filter-category">
                    <option value="All">All Categories</option>
                    <option value="General">General</option>
                    <option value="Public">Public</option>
                    <option value="Social">Social</option>
                    <option value="Environment">Environment</option>
                </select>
            </div>
            
            <div id="status-message" class="hidden">Connecting...</div>
            <div id="list-container">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
